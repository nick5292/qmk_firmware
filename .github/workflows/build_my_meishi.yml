name: Build My Meishi Trackball
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    # Node.js 24への対応を強制して警告を黙らせる
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    container: qmkfm/qmk_cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Firmware
        run: |
          # ビルド実行
          qmk compile -kb aki27/trackball_module -km default
          
          # 【重要】ファイルがどこにあるかログに出力して確認
          echo "--- Searching for compiled files ---"
          find . -name "*.hex" -o -name "*.bin"
          
          # 安全のため、見つかったファイルをカレントディレクトリに集める
          find . -name "*.hex" -exec cp {} . \;
          find . -name "*.bin" -exec cp {} . \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: meishi_firmware
          # カレントディレクトリにあるファイルをすべてアップロード
          path: |
            *.hex
            *.bin
          if-no-files-found: error
